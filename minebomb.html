<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Minesweeper</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background">

    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

</div>

<div class="container">

    <h1>💣 Minesweeper</h1>

    <div class="topBar">

        <div class="difficulty">

            <label for="difficulty">

                Difficulty

            </label>

            <select id="difficulty">

                <option value="easy">

                    Easy

                </option>

                <option value="normal" selected>

                    Normal

                </option>

                <option value="hard">

                    Hard

                </option>

            </select>

        </div>

        <button id="restart">

            🔄 Restart

        </button>

    </div>

    <div class="stats">

        <div class="card">

            💣 Mines

            <span id="mineCounter">

                40

            </span>

        </div>

        <div class="card">

            ⏱ Time

            <span id="timer">

                0

            </span>

        </div>

        <div class="card">

            🚩 Flags

            <span id="flagCounter">

                0

            </span>

        </div>

    </div>

    <div id="message">

    </div>

    <div id="board">

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
